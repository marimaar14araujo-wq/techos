<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TechOS — Ordens de Serviço</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00d4aa">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TechOS">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111418;
    --surface2: #181c22;
    --border: #252a32;
    --accent: #00d4aa;
    --accent2: #0094ff;
    --danger: #ff4d6a;
    --warn: #ffb224;
    --text: #e8eaf0;
    --text2: #8892a0;
    --text3: #4a5568;
    --radius: 10px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }
  body::before {
    content: '';
    position: fixed;
    top: -40%; left: -20%;
    width: 60vw; height: 60vw;
    background: radial-gradient(circle, rgba(0,212,170,0.04) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky; top: 0; z-index: 100;
    backdrop-filter: blur(12px);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .stat-pills { display: flex; gap: 8px; }
  .stat-pill { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px; font-size: 0.75rem; font-family: 'JetBrains Mono', monospace; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot-green { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
  .dot-gray { background: var(--text3); }

  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: var(--radius); font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; border: none; outline: none; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), #00b894); color: #000; }
  .btn-primary:hover, .btn-primary:active { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(0,212,170,0.35); }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: rgba(255,77,106,0.12); color: var(--danger); border: 1px solid rgba(255,77,106,0.3); }
  .btn-warn { background: rgba(255,178,36,0.12); color: var(--warn); border: 1px solid rgba(255,178,36,0.3); }
  .btn-sm { padding: 6px 11px; font-size: 0.78rem; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; position: relative; z-index: 1; }

  .tabs { display: flex; gap: 3px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 3px; margin-bottom: 20px; width: fit-content; }
  .tab { padding: 7px 16px; border-radius: 7px; cursor: pointer; font-weight: 500; font-size: 0.85rem; color: var(--text2); transition: all 0.2s; border: none; background: none; font-family: 'Space Grotesk', sans-serif; }
  .tab.active { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
  .tab:hover:not(.active) { color: var(--text); }

  .filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px 14px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; outline: none; transition: border 0.2s; }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }
  select.search-input { cursor: pointer; max-width: 170px; }

  .os-grid { display: flex; flex-direction: column; gap: 10px; }
  .os-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; display: grid; grid-template-columns: 72px 1fr auto; align-items: center; gap: 14px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .os-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; transition: background 0.2s; }
  .os-card.status-open::before { background: var(--accent); }
  .os-card.status-closed::before { background: var(--text3); }
  .os-card:hover { border-color: rgba(0,212,170,0.3); transform: translateX(2px); }
  .os-number { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 600; color: var(--accent); }
  .os-number small { display: block; font-size: 0.65rem; color: var(--text3); font-weight: 400; margin-top: 2px; }
  .os-info h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 3px; }
  .os-info .meta { display: flex; gap: 12px; flex-wrap: wrap; font-size: 0.75rem; color: var(--text2); }
  .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; white-space: nowrap; }
  .badge-open { background: rgba(0,212,170,0.12); color: var(--accent); border: 1px solid rgba(0,212,170,0.3); }
  .badge-closed { background: rgba(72,85,99,0.2); color: var(--text3); border: 1px solid var(--border); }
  .os-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }

  .priority-tag { padding: 2px 7px; border-radius: 4px; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; }
  .priority-alta { background: rgba(255,77,106,0.12); color: var(--danger); }
  .priority-media { background: rgba(255,178,36,0.12); color: var(--warn); }
  .priority-baixa { background: rgba(0,148,255,0.12); color: var(--accent2); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.78); z-index: 200; backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 100%; max-width: 620px; max-height: 92dvh; overflow-y: auto; animation: slideUp 0.22s ease; }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .modal-header h2 { font-size: 1.05rem; font-weight: 700; }
  .modal-header p { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
  .close-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text2); width: 30px; height: 30px; border-radius: 7px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
  .close-btn:hover { color: var(--text); border-color: var(--accent); }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; position: sticky; bottom: 0; background: var(--surface); }

  .form-section { margin-bottom: 20px; }
  .form-section-title { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .form-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.full { grid-template-columns: 1fr; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 0.75rem; font-weight: 500; color: var(--text2); }
  .field input, .field textarea, .field select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 9px 11px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 0.85rem; outline: none; transition: border 0.2s; width: 100%; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .field textarea { resize: vertical; min-height: 72px; }
  .field input::placeholder, .field textarea::placeholder { color: var(--text3); }
  .field select { cursor: pointer; }

  /* DETAIL */
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; gap: 12px; }
  .detail-os-num { font-family: 'JetBrains Mono', monospace; font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .detail-section { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .detail-section-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text3); margin-bottom: 10px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-item label { font-size: 0.7rem; color: var(--text3); display: block; margin-bottom: 2px; }
  .detail-item span { font-size: 0.85rem; font-weight: 500; }
  .detail-item.full { grid-column: 1/-1; }

  /* CARD ACTIONS row */
  .card-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  /* INSTALL BANNER */
  #installBanner { display: none; position: fixed; bottom: calc(16px + var(--safe-bot)); left: 16px; right: 16px; background: var(--surface); border: 1px solid var(--accent); border-radius: 14px; padding: 14px 18px; z-index: 500; box-shadow: 0 8px 30px rgba(0,212,170,0.2); animation: slideUp 0.3s ease; }
  #installBanner.show { display: flex; align-items: center; gap: 14px; }
  .install-text { flex: 1; }
  .install-text strong { display: block; font-size: 0.9rem; }
  .install-text span { font-size: 0.78rem; color: var(--text2); }

  /* TOAST */
  .toast { position: fixed; bottom: calc(80px + var(--safe-bot)); right: 16px; background: var(--surface); border: 1px solid var(--accent); border-radius: 10px; padding: 12px 18px; font-size: 0.85rem; color: var(--accent); z-index: 999; animation: fadeInUp 0.3s ease; box-shadow: 0 8px 24px rgba(0,212,170,0.15); }
  @keyframes fadeInUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--text3); }
  .empty-state .icon { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.35; }
  .empty-state h3 { font-size: 0.95rem; color: var(--text2); margin-bottom: 6px; }
  .empty-state p { font-size: 0.82rem; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    .os-card { grid-template-columns: 1fr; gap: 10px; }
    .stat-pills { display: none; }
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr 1fr; }
    .detail-grid { grid-template-columns: 1fr; }
    .modal-body { padding: 16px 18px; }
    .modal-footer { padding: 12px 18px; }
  }

  @media print {
    body { background: white; color: #000; }
    .no-print { display: none !important; }
    header { display: none !important; }
    .print-page { padding: 14mm 16mm; max-width: 210mm; margin: 0 auto; }
    .print-copy-label { text-align: center; font-size: .72rem; font-weight: 700; text-transform: uppercase; border: 1px solid #000; padding: 4px; margin-bottom: 12px; letter-spacing: 2px; }
    .print-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 12px; }
    .print-title { font-size: 1.2rem; font-weight: 800; }
    .print-os-num { font-family: monospace; font-size: 1rem; font-weight: 700; }
    .print-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
    .print-field { border-bottom: 1px solid #ccc; padding-bottom: 4px; margin-bottom: 4px; }
    .print-field label { font-size: .65rem; text-transform: uppercase; color: #666; display: block; }
    .print-field span { font-size: .85rem; font-weight: 600; display: block; }
    .print-sign { display: flex; gap: 40px; margin-top: 30px; }
    .print-sign-line { flex: 1; border-top: 1px solid #000; padding-top: 4px; text-align: center; font-size: .75rem; }
    hr.dashed { border: none; border-top: 2px dashed #bbb; margin: 20px 0; }
  }
</style>
</head>
<body>

<header class="no-print">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    Tech<span>OS</span>
  </div>
  <div class="header-right">
    <div class="stat-pills">
      <div class="stat-pill"><div class="stat-dot dot-green"></div><span id="stat-open">0</span></div>
      <div class="stat-pill"><div class="stat-dot dot-gray"></div><span id="stat-closed">0</span></div>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="exportData()" title="Exportar backup">💾 Backup</button>
    <label class="btn btn-secondary btn-sm" style="cursor:pointer" title="Importar backup">📂 Restaurar<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    <button class="btn btn-primary btn-sm" onclick="openNewModal()">＋ Nova O.S.</button>
  </div>
</header>

<div class="container no-print">
  <div class="tabs">
    <button class="tab active" onclick="setTab('all',this)">Todas</button>
    <button class="tab" onclick="setTab('open',this)">Abertas</button>
    <button class="tab" onclick="setTab('closed',this)">Fechadas</button>
  </div>
  <div class="filter-bar">
    <input class="search-input" type="search" id="searchInput" placeholder="🔍  Buscar cliente, O.S., equipamento..." oninput="renderList()">
    <select class="search-input" id="priorityFilter" onchange="renderList()">
      <option value="">Todas as prioridades</option>
      <option value="Alta">Alta</option>
      <option value="Média">Média</option>
      <option value="Baixa">Baixa</option>
    </select>
  </div>
  <div class="os-grid" id="osList"></div>
</div>

<!-- MODAL NOVA/EDITAR -->
<div class="modal-overlay" id="modalNew">
  <div class="modal">
    <div class="modal-header">
      <div><h2 id="modalTitle">Nova Ordem de Serviço</h2><p id="modalSubtitle">Preencha os dados para abrir a O.S.</p></div>
      <button class="close-btn" onclick="closeModal('modalNew')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-section">
        <div class="form-section-title">👤 Dados do Cliente</div>
        <div class="form-row"><div class="field"><label>Nome completo *</label><input type="text" id="f_nome" placeholder="João da Silva"></div><div class="field"><label>CPF / CNPJ</label><input type="text" id="f_cpf" placeholder="000.000.000-00"></div></div>
        <div class="form-row"><div class="field"><label>Telefone *</label><input type="tel" id="f_telefone" placeholder="(82) 99999-9999"></div><div class="field"><label>E-mail</label><input type="email" id="f_email" placeholder="cliente@email.com"></div></div>
        <div class="form-row full"><div class="field"><label>Endereço</label><input type="text" id="f_endereco" placeholder="Rua, número, bairro, cidade"></div></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">🖥️ Equipamento</div>
        <div class="form-row"><div class="field"><label>Tipo *</label><input type="text" id="f_equipamento" placeholder="Notebook, TV, Impressora..."></div><div class="field"><label>Marca / Modelo</label><input type="text" id="f_modelo" placeholder="Dell Inspiron 15"></div></div>
        <div class="form-row three">
          <div class="field"><label>Nº de série</label><input type="text" id="f_serial" placeholder="SN12345"></div>
          <div class="field"><label>Prioridade</label><select id="f_prioridade"><option value="Baixa">Baixa</option><option value="Média" selected>Média</option><option value="Alta">Alta</option></select></div>
          <div class="field"><label>Previsão entrega</label><input type="date" id="f_previsao"></div>
        </div>
      </div>
      <div class="form-section">
        <div class="form-section-title">🔧 Serviço</div>
        <div class="form-row full"><div class="field"><label>Defeito relatado *</label><textarea id="f_defeito" placeholder="Descreva o problema relatado pelo cliente..."></textarea></div></div>
        <div class="form-row full"><div class="field"><label>Diagnóstico técnico</label><textarea id="f_diagnostico" placeholder="Diagnóstico inicial do técnico..."></textarea></div></div>
        <div class="form-row"><div class="field"><label>Técnico responsável</label><input type="text" id="f_tecnico" placeholder="Nome do técnico"></div><div class="field"><label>Valor estimado (R$)</label><input type="text" id="f_valor" placeholder="0,00"></div></div>
      </div>
      <div class="form-section">
        <div class="form-section-title">📝 Observações</div>
        <div class="form-row full"><div class="field"><label>Observações adicionais</label><textarea id="f_obs" placeholder="Acessórios recebidos, condições do aparelho..."></textarea></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalNew')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveOS()">💾 Salvar O.S.</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHE -->
<div class="modal-overlay" id="modalDetail">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <div><h2>Detalhes da O.S.</h2><p id="d_created"></p></div>
      <button class="close-btn" onclick="closeModal('modalDetail')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<!-- MODAL FECHAR OS -->
<div class="modal-overlay" id="modalClose">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <div><h2>Fechar Ordem de Serviço</h2><p>Registre os dados do encerramento</p></div>
      <button class="close-btn" onclick="closeModal('modalClose')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-section">
        <div class="form-section-title">✅ Resolução</div>
        <div class="form-row full"><div class="field"><label>Serviço executado *</label><textarea id="c_servico" placeholder="Descreva o que foi feito..."></textarea></div></div>
        <div class="form-row full"><div class="field"><label>Peças / materiais utilizados</label><textarea id="c_pecas" placeholder="Liste as peças substituídas..." style="min-height:56px"></textarea></div></div>
        <div class="form-row"><div class="field"><label>Valor final (R$) *</label><input type="text" id="c_valor" placeholder="0,00"></div><div class="field"><label>Data de entrega</label><input type="date" id="c_entrega"></div></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalClose')">Cancelar</button>
      <button class="btn btn-primary" onclick="confirmClose()">✅ Fechar O.S.</button>
    </div>
  </div>
</div>

<!-- INSTALL BANNER -->
<div id="installBanner">
  <div>⚡</div>
  <div class="install-text">
    <strong>Instalar TechOS</strong>
    <span>Adicione à sua tela inicial para acesso rápido</span>
  </div>
  <button class="btn btn-primary btn-sm" id="installBtn">Instalar</button>
  <button class="close-btn" onclick="document.getElementById('installBanner').classList.remove('show')">✕</button>
</div>

<script>
// ===== STATE =====
let orders = JSON.parse(localStorage.getItem('techOS_orders') || '[]');
let currentTab = 'all';
let editingId = null;
let closingId = null;
let osCounter = parseInt(localStorage.getItem('techOS_counter') || '0');

function saveState() {
  localStorage.setItem('techOS_orders', JSON.stringify(orders));
  localStorage.setItem('techOS_counter', String(osCounter));
}

function nextOSNum() {
  osCounter++;
  saveState();
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2);
  const mm = String(now.getMonth()+1).padStart(2,'0');
  return `OS${yy}${mm}${String(osCounter).padStart(4,'0')}`;
}

// ===== TABS =====
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ===== RENDER =====
function renderList() {
  const search = (document.getElementById('searchInput').value || '').toLowerCase();
  const prio = document.getElementById('priorityFilter').value;

  let list = orders.filter(o => {
    const matchTab = currentTab === 'all' || (currentTab === 'open' && o.status === 'open') || (currentTab === 'closed' && o.status === 'closed');
    const matchSearch = !search || o.numero.toLowerCase().includes(search) || o.cliente.nome.toLowerCase().includes(search) || o.equipamento.tipo.toLowerCase().includes(search) || (o.servico.defeito||'').toLowerCase().includes(search);
    const matchPrio = !prio || o.equipamento.prioridade === prio;
    return matchTab && matchSearch && matchPrio;
  }).sort((a,b) => new Date(b.criadoEm) - new Date(a.criadoEm));

  const open = orders.filter(o => o.status === 'open').length;
  const closed = orders.filter(o => o.status === 'closed').length;
  document.getElementById('stat-open').textContent = `${open} Aberta${open!==1?'s':''}`;
  document.getElementById('stat-closed').textContent = `${closed} Fechada${closed!==1?'s':''}`;

  const container = document.getElementById('osList');
  if (!list.length) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><h3>Nenhuma O.S. encontrada</h3><p>Clique em "+ Nova O.S." para criar a primeira ordem.</p></div>`;
    return;
  }
  const prioMap = { Alta: 'priority-alta', Média: 'priority-media', Baixa: 'priority-baixa' };
  container.innerHTML = list.map(o => {
    const dateStr = new Date(o.criadoEm).toLocaleDateString('pt-BR');
    const pc = prioMap[o.equipamento.prioridade] || '';
    return `<div class="os-card status-${o.status}" onclick="openDetail('${o.id}')">
      <div class="os-number">${o.numero}<small>${dateStr}</small></div>
      <div class="os-info">
        <h3>${o.cliente.nome}</h3>
        <div class="meta">
          <span>🖥️ ${o.equipamento.tipo}${o.equipamento.modelo?' — '+o.equipamento.modelo:''}</span>
          <span>📞 ${o.cliente.telefone}</span>
          ${o.servico.tecnico?`<span>👷 ${o.servico.tecnico}</span>`:''}
        </div>
      </div>
      <div class="os-right">
        <div style="display:flex;gap:6px;align-items:center">
          <span class="priority-tag ${pc}">${o.equipamento.prioridade}</span>
          <span class="badge badge-${o.status}">${o.status==='open'?'● Aberta':'✔ Fechada'}</span>
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          ${o.status==='open'?`<button class="btn btn-warn btn-sm" onclick="openCloseModal('${o.id}')">Fechar</button>`:''}
          <button class="btn btn-secondary btn-sm" onclick="printOS('${o.id}')">🖨</button>
          <button class="btn btn-danger btn-sm" onclick="deleteOS('${o.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== MODALS =====

  editingId = id;
  if (id) {
    const o = orders.find(x => x.id===id);
    document.getElementById('modalTitle').textContent = 'Editar O.S. — '+o.numero;
    document.getElementById('modalSubtitle').textContent = 'Atualize os dados';
    document.getElementById('f_nome').value=o.cliente.nome;
    document.getElementById('f_cpf').value=o.cliente.cpf;
    document.getElementById('f_telefone').value=o.cliente.telefone;
    document.getElementById('f_email').value=o.cliente.email;
    document.getElementById('f_endereco').value=o.cliente.endereco;
    document.getElementById('f_equipamento').value=o.equipamento.tipo;
    document.getElementById('f_modelo').value=o.equipamento.modelo;
    document.getElementById('f_serial').value=o.equipamento.serial;
    document.getElementById('f_prioridade').value=o.equipamento.prioridade;
    document.getElementById('f_previsao').value=o.equipamento.previsao;
    document.getElementById('f_defeito').value=o.servico.defeito;
    document.getElementById('f_diagnostico').value=o.servico.diagnostico;
    document.getElementById('f_tecnico').value=o.servico.tecnico;
    document.getElementById('f_valor').value=o.servico.valor;
    document.getElementById('f_obs').value=o.obs;
  } else {
    document.getElementById('modalTitle').textContent='Nova Ordem de Serviço';
    document.getElementById('modalSubtitle').textContent='Preencha os dados para abrir a O.S.';
    ['nome','cpf','telefone','email','endereco','equipamento','modelo','serial','defeito','diagnostico','tecnico','valor','obs'].forEach(f=>{ const el=document.getElementById('f_'+f); if(el) el.value=''; });
    document.getElementById('f_prioridade').value='Média';
    const d=new Date(); d.setDate(d.getDate()+7);
    document.getElementById('f_previsao').value=d.toISOString().slice(0,10);
  }
  document.getElementById('modalNew').classList.add('show');
}
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function saveOS() {
  const nome=document.getElementById('f_nome').value.trim();
  const telefone=document.getElementById('f_telefone').value.trim();
  const equip=document.getElementById('f_equipamento').value.trim();
  const defeito=document.getElementById('f_defeito').value.trim();
  if(!nome||!telefone||!equip||!defeito){showToast('⚠️ Preencha os campos obrigatórios!');return;}
  if(editingId){
    const idx=orders.findIndex(x=>x.id===editingId);
    const o=orders[idx];
    o.cliente={nome,cpf:document.getElementById('f_cpf').value,telefone,email:document.getElementById('f_email').value,endereco:document.getElementById('f_endereco').value};
    o.equipamento={tipo:equip,modelo:document.getElementById('f_modelo').value,serial:document.getElementById('f_serial').value,prioridade:document.getElementById('f_prioridade').value,previsao:document.getElementById('f_previsao').value};
    o.servico={defeito,diagnostico:document.getElementById('f_diagnostico').value,tecnico:document.getElementById('f_tecnico').value,valor:document.getElementById('f_valor').value};
    o.obs=document.getElementById('f_obs').value;
    showToast('✅ O.S. atualizada!');
  } else {
    const order={id:Date.now().toString(),numero:nextOSNum(),status:'open',criadoEm:new Date().toISOString(),fechadoEm:null,
      cliente:{nome,cpf:document.getElementById('f_cpf').value,telefone,email:document.getElementById('f_email').value,endereco:document.getElementById('f_endereco').value},
      equipamento:{tipo:equip,modelo:document.getElementById('f_modelo').value,serial:document.getElementById('f_serial').value,prioridade:document.getElementById('f_prioridade').value,previsao:document.getElementById('f_previsao').value},
      servico:{defeito,diagnostico:document.getElementById('f_diagnostico').value,tecnico:document.getElementById('f_tecnico').value,valor:document.getElementById('f_valor').value},
      fechamento:null,obs:document.getElementById('f_obs').value};
    orders.push(order);
    showToast('✅ O.S. '+order.numero+' criada!');
  }
  saveState(); closeModal('modalNew'); renderList();
}

// ===== CLOSE OS =====
function openCloseModal(id) {
  closingId=id;
  document.getElementById('c_servico').value='';
  document.getElementById('c_pecas').value='';
  document.getElementById('c_valor').value='';
  document.getElementById('c_entrega').value=new Date().toISOString().slice(0,10);
  document.getElementById('modalClose').classList.add('show');
}
function confirmClose() {
  const servico=document.getElementById('c_servico').value.trim();
  const valor=document.getElementById('c_valor').value.trim();
  if(!servico||!valor){showToast('⚠️ Informe o serviço e o valor!');return;}
  const idx=orders.findIndex(x=>x.id===closingId);
  orders[idx].status='closed'; orders[idx].fechadoEm=new Date().toISOString();
  orders[idx].fechamento={servico,pecas:document.getElementById('c_pecas').value,valor,entrega:document.getElementById('c_entrega').value};
  saveState(); closeModal('modalClose'); renderList();
  showToast('✅ O.S. '+orders[idx].numero+' fechada!');
}

// ===== DELETE =====
function deleteOS(id) {
  if(!confirm('Excluir esta O.S.? A ação não pode ser desfeita.'))return;
  orders=orders.filter(x=>x.id!==id); saveState(); renderList();
  showToast('🗑️ O.S. excluída.');
}

// ===== TOAST =====
function showToast(msg) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.style.opacity='0',2200);
  setTimeout(()=>t.remove(),2600);
}

// ===== PWA INSTALL =====
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt=e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const {outcome}=await deferredPrompt.userChoice;
  if(outcome==='accepted') showToast('✅ TechOS instalado com sucesso!');
  deferredPrompt=null;
  document.getElementById('installBanner').classList.remove('show');
});
window.addEventListener('appinstalled', ()=>{
  document.getElementById('installBanner').classList.remove('show');
  showToast('⚡ TechOS instalado!');
});

if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(()=>console.log('SW registered'));
}

// ===== EXPORT / IMPORT =====
function exportData() {
  if (orders.length === 0) { showToast('⚠️ Nenhuma O.S. para exportar!'); return; }
  const backup = {
    versao: '1.0',
    exportadoEm: new Date().toISOString(),
    totalOS: orders.length,
    contador: osCounter,
    ordens: orders
  };
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const data = new Date().toLocaleDateString('pt-BR').replace(/\//g, '-');
  a.href = url;
  a.download = `techos-backup-${data}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ Backup exportado com sucesso!');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const backup = JSON.parse(e.target.result);
      if (!backup.ordens || !Array.isArray(backup.ordens)) {
        showToast('❌ Arquivo inválido!'); return;
      }
      const total = backup.ordens.length;
      if (!confirm(`Encontradas ${total} ordens de serviço no backup.\n\nIsso vai SUBSTITUIR todos os dados atuais. Deseja continuar?`)) {
        event.target.value = ''; return;
      }
      orders = backup.ordens;
      osCounter = backup.contador || orders.length;
      saveState();
      renderList();
      showToast(`✅ ${total} O.S. restauradas com sucesso!`);
    } catch {
      showToast('❌ Erro ao ler o arquivo!');
    }
    event.target.value = '';
  };
  reader.readAsText(file);
}

// ===== INIT =====
